name: Publish package

# Publishes @alex-oden/ui to GitHub Packages.
# Run it from the GitHub UI: Actions tab -> "Publish package" -> "Run workflow".
# Uses the built-in GITHUB_TOKEN (no personal token needed).

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@alex-oden"
      # Install deps (skipping the "prepare" hook) so vite is available, then
      # build dist/ fresh and publish it.
      - run: npm install --no-audit --no-fund --ignore-scripts
      - run: npm run build:lib
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
