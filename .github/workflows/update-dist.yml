name: Update dist

# Build the library and commit the dist/ folder on every push to main.
# This keeps the GitHub-hosted package installable via
# `bun add github:alex-oden/np-design-lib#v<version>` without maintaining
# the build output manually.

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-commit-dist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: "${{ !contains(github.event.head_commit.message, 'chore: update dist') }}"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run build:lib

      - name: Commit and push dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist
          if git diff --cached --quiet; then
            echo "No dist changes to commit."
            exit 0
          fi
          git commit -m "chore: update dist"
          git push
